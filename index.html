<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRD PORTAL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --brand: #6366f1; --brand-light: #e0e7ff; --bg: #f8fafc; --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --warning: #f59e0b;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.8); --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155;
        }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Glassmorphism */
        .glass { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        
        /* Sidebar & Layout */
        .sidebar { transition: all 0.3s ease; z-index: 50; }
        .sidebar.hidden { transform: translateX(-100%); }
        .nav-btn { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; transition: 0.2s; color: var(--text-muted); cursor: pointer; }
        .nav-btn.active { background: var(--brand); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }

        /* Table UI */
        .main-table-container { border-radius: 16px; overflow-x: auto; background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(99, 102, 241, 0.05); text-align: left; padding: 14px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--border); }
        td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(99, 102, 241, 0.03); }

        /* Custom Inputs */
        .remarks-editor { border: 1px solid transparent; background: transparent; width: 100%; padding: 4px; border-radius: 4px; transition: 0.2s; color: inherit; }
        .remarks-editor:focus { background: white; border-color: var(--brand); outline: none; box-shadow: 0 0 0 3px var(--brand-light); }
        
        .status-select { padding: 4px 8px; border-radius: 20px; font-weight: 700; font-size: 11px; border: none; cursor: pointer; }
        .s-PENDING { background: #fee2e2; color: #991b1b; }
        .s-Docked { background: #dcfce7; color: #166534; }
        .s-Undocked { background: #f1f5f9; color: #475569; }
        
        /* Mobile Optimization (iPhone 12 Pro) */
        @media (max-width: 768px) {
            .hide-mobile { display: none; }
            .sidebar { position: fixed; height: 100vh; width: 280px; }
            .main-content { padding: 10px; }
        }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { width: 95%; max-width: 500px; padding: 24px; border-radius: 24px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); }
        
        .age-badge { padding: 2px 8px; border-radius: 6px; font-weight: 800; border: 1px solid var(--border); background: var(--bg); }
    </style>
</head>
<body>

    <div id="auth-overlay" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-slate-900 text-white p-6" style="display:none;">
        <h1 class="text-3xl font-black mb-8 tracking-tighter">SRD PORTAL <span class="text-indigo-400">2026</span></h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="login-email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-indigo-500">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:border-indigo-500">
            <button onclick="handleLogin()" class="w-full p-4 bg-indigo-600 rounded-2xl font-bold hover:bg-indigo-500 transition">SIGN IN</button>
        </div>
    </div>

    <div class="flex min-h-screen">
        
        <aside class="sidebar glass w-72 p-6 flex flex-col gap-8">
            <div class="flex items-center justify-between">
                <h2 class="font-black text-xl tracking-tighter">SRD <span class="text-indigo-500">SYSTEM</span></h2>
                <button onclick="toggleSidebar()" class="lg:hidden text-2xl">&times;</button>
            </div>

            <nav class="flex flex-col gap-2">
                <div id="nav-dash" onclick="switchPage('DASH')" class="nav-btn active"><span>📊</span> Dashboard</div>
                <div id="nav-yard" onclick="switchPage('YARD')" class="nav-btn"><span>⚓</span> Boat Yard Log</div>
                <div id="nav-tasks" onclick="switchPage('TASKS')" class="nav-btn"><span>⚙️</span> Task Manager</div>
                <div id="nav-trans" onclick="switchPage('TRANS')" class="nav-btn"><span>📜</span> History</div>
            </nav>

            <div class="mt-auto pt-6 border-t border-slate-200">
                <div id="online-list" class="mb-4 text-[10px] uppercase font-bold flex flex-wrap gap-2"></div>
                <button onclick="handleLogout()" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-sm font-bold">LOGOUT</button>
            </div>
        </aside>

        <main class="flex-1 p-4 lg:p-8 overflow-y-auto main-content">
            <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 id="page-title" class="text-3xl font-black tracking-tighter">PRF TRACKER</h1>
                    <p class="text-sm text-slate-500">Managing MTCC Fleet Operations</p>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="toggleTheme()" id="theme-icon" class="p-3 glass rounded-xl text-lg">🌙</button>
                    <div class="relative flex-1 lg:w-64">
                        <input type="text" id="main-search" oninput="refreshTable()" placeholder="Search logs..." class="w-full p-3 pl-10 glass rounded-xl outline-none focus:ring-2 ring-indigo-500 text-sm">
                        <span class="absolute left-3 top-3.5 opacity-40">🔍</span>
                    </div>
                </div>
            </header>

            <div class="flex flex-wrap gap-3 mb-6">
                <button id="btn-create" onclick="openModal()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 hover:scale-105 active:scale-95 transition">＋ NEW ENTRY</button>
                <button id="btn-toggle-comp" onclick="toggleCompleted()" class="px-4 py-3 glass rounded-xl text-xs font-bold flex items-center gap-2">📦 SHOW RECEIVED</button>
                <button id="btn-toggle-undocked" onclick="toggleUndocked()" class="px-4 py-3 glass rounded-xl text-xs font-bold flex items-center gap-2" style="display:none;">🚢 SHOW UNDOCKED</button>
                <button onclick="exportPDF()" class="px-4 py-3 glass rounded-xl text-xs font-bold flex items-center gap-2">📄 EXPORT PDF</button>
            </div>

            <div class="main-table-container glass p-2">
                <table id="main-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="entry-modal" class="modal-overlay">
        <div id="inner-modal" class="modal glass">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-xl font-black">NEW ENTRY</h2>
                <button onclick="closeModal()" class="text-2xl opacity-50 hover:opacity-100">&times;</button>
            </div>

            <div id="prf-form">
                <label class="text-[10px] font-black opacity-50 uppercase">Purchase Request #</label>
                <input type="text" id="m-prf" placeholder="e.g. PRF-2026-001">
                <label class="text-[10px] font-black opacity-50 uppercase">Asset / Vessel Name</label>
                <input type="text" id="m-asset" placeholder="e.g. M.T. EAGLE">
                <label class="text-[10px] font-black opacity-50 uppercase">Assigned Workshop</label>
                <select id="m-workshop">
                    <option>HULHUMALE SHIPYARD</option>
                    <option>THILAFUSHI WORKSHOP</option>
                    <option>MARINE ENGINES</option>
                    <option>WELDING & FABRICATION</option>
                </select>
                <button onclick="savePRF(false)" class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-bold mb-3">SAVE ENTRY</button>
                <button onclick="savePRF(true)" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold">SAVE & OPEN ERP FORM</button>
            </div>

            <div id="yard-form" style="display:none;">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black opacity-50 uppercase">Slot</label>
                        <input type="text" id="y-slot" placeholder="S1">
                    </div>
                    <div>
                        <label class="text-[10px] font-black opacity-50 uppercase">Owner</label>
                        <input type="text" id="y-owner" placeholder="Internal/Client">
                    </div>
                </div>
                <label class="text-[10px] font-black opacity-50 uppercase">Vessel Name</label>
                <input type="text" id="y-vessel" placeholder="M.V. CARGO">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black opacity-50 uppercase">SR #</label>
                        <input type="text" id="y-sr" placeholder="SR-000">
                    </div>
                    <div>
                        <label class="text-[10px] font-black opacity-50 uppercase">WO #</label>
                        <input type="text" id="y-wo" placeholder="WO-000">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black opacity-50 uppercase">Docking Date</label>
                        <input type="date" id="y-docked">
                    </div>
                    <div>
                        <label class="text-[10px] font-black opacity-50 uppercase">Est. Undock</label>
                        <input type="date" id="y-est-undock">
                    </div>
                </div>
                <button onclick="saveYardEntry()" class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-bold mt-4">REGISTER VESSEL</button>
            </div>

            <div id="task-form" style="display:none;">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="t-sr" placeholder="SR #">
                    <input type="date" id="t-sr-date">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="t-wo" placeholder="WO #">
                    <input type="date" id="t-wo-date">
                </div>
                <input type="text" id="t-asset" placeholder="ASSET / SERVICE NAME">
                <div id="t-task-list" class="max-h-48 overflow-y-auto mb-4 border-y border-slate-100 py-4"></div>
                <button onclick="addTaskRow()" class="text-xs font-bold text-indigo-500 mb-4 inline-block">＋ ADD TASK ITEM</button>
                <button onclick="saveTaskEntry()" class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-bold">SAVE SERVICE REQUEST</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
