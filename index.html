<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRD PORTAL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --brand: #6366f1;
            --brand-light: #e0e7ff;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .sidebar {
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .sidebar.hidden { transform: translateX(-100%); }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: var(--brand);
            color: white;
        }

        .status-select {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }

        /* Status Colors */
        .s-Docked { color: var(--brand); background: var(--brand-light); }
        .s-Undocked { color: var(--text-muted); background: #f1f5f9; }
        .s-PENDING { color: var(--warning); background: #fef3c7; }
        .s-ALL-RECEIVED, .s-COMPLETED { color: var(--success); background: #d1fae5; }

        .remarks-editor {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            padding: 4px;
            border-radius: 4px;
            outline: none;
        }

        .remarks-editor:focus { border-color: var(--brand); background: var(--card-bg); }

        .age-badge {
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid var(--brand);
            color: var(--brand);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { position: sticky; top: 0; background: var(--bg); z-index: 10; text-align: left; padding: 12px; font-size: 12px; color: var(--text-muted); border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100;
        }

        .modal {
            background: var(--card-bg);
            width: 95%; max-width: 500px; padding: 24px; border-radius: 20px;
            max-height: 90vh; overflow-y: auto;
        }

        .task-modal { max-width: 800px; }

        /* iPhone 12 Pro Optimizations */
        @media (max-width: 390px) {
            .hide-mobile { display: none; }
            th, td { padding: 8px; font-size: 11px; }
            .age-badge { font-size: 9px; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center">
            <div class="mb-6 bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-3xl">⚓</div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">SRD Portal</h1>
            <p class="text-slate-500 mb-8 text-sm">Please sign in to access fleet records.</p>
            <input type="email" id="login-email" placeholder="Email Address" class="w-full mb-4 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-indigo-500">
            <input type="password" id="login-pass" placeholder="Password" class="w-full mb-6 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-indigo-500">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition">SIGN IN</button>
        </div>
    </div>

    <aside class="sidebar fixed inset-y-0 left-0 w-64 glass-card p-4 hidden md:block">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-indigo-600 text-white p-2 rounded-lg text-xl">⚓</div>
            <h2 class="font-bold text-lg tracking-tight">SRD PORTAL</h2>
        </div>

        <nav class="space-y-2">
            <button onclick="switchPage('DASH')" id="nav-dash" class="nav-btn w-full active"><span>📋</span> PRF Tracker</button>
            <button onclick="switchPage('YARD')" id="nav-yard" class="nav-btn w-full"><span>🏗️</span> Boat Yard</button>
            <button onclick="switchPage('TASKS')" id="nav-tasks" class="nav-btn w-full"><span>🛠️</span> Task Manager</button>
            <button onclick="switchPage('TRANS')" id="nav-trans" class="nav-btn w-full"><span>📜</span> History</button>
        </nav>

        <div class="absolute bottom-8 left-4 right-4">
            <div id="online-list" class="mb-4 space-y-1"></div>
            <button onclick="handleLogout()" class="nav-btn w-full text-red-500"><span>🚪</span> Logout</button>
        </div>
    </aside>

    <main class="md:ml-64 p-4 md:p-8 min-h-screen">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 id="page-title" class="text-2xl font-black text-indigo-600">PRF TRACKER</h1>
                <p class="text-sm text-slate-500 font-medium">Fleet Maintenance & Logistics System</p>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="toggleTheme()" id="theme-icon" class="p-3 glass-card rounded-xl">🌙</button>
                <button onclick="exportPDF()" class="p-3 bg-slate-800 text-white rounded-xl shadow-lg">📥 PDF</button>
                <button onclick="openModal()" id="btn-create" class="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200">ADD NEW</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="md:col-span-2 relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                <input type="text" id="main-search" placeholder="Search by Asset, PRF, SR or WO..." oninput="refreshTable()" class="w-full pl-12 pr-4 py-4 glass-card rounded-2xl outline-none focus:ring-2 ring-indigo-500">
            </div>
            
            <button onclick="toggleCompleted()" id="btn-toggle-comp" class="glass-card rounded-2xl flex items-center justify-center font-bold text-sm gap-2 transition">
                Show Completed
            </button>
            
            <button onclick="toggleUndocked()" id="btn-toggle-undocked" class="glass-card rounded-2xl hidden items-center justify-center font-bold text-sm gap-2 transition">
                Show Undocked
            </button>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden">
            <div class="overflow-x-auto">
                <table id="main-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="entry-modal" class="modal-overlay">
        <div id="inner-modal" class="modal glass-card">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-xl font-black">NEW ENTRY</h2>
                <button onclick="closeModal()" class="text-2xl text-slate-400">&times;</button>
            </div>

            <div id="prf-form" class="space-y-4">
                <input type="text" id="m-prf" placeholder="PRF Number (e.g., 500123)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                <input type="text" id="m-asset" placeholder="Asset Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                <select id="m-workshop" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    <option value="">Select Workshop</option>
                    <option>HULHUMALE</option>
                    <option>THILAFUSHI</option>
                    <option>MAHIBADHOO</option>
                </select>
                <button onclick="savePRF(false)" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4">SAVE ENTRY</button>
                <button onclick="savePRF(true)" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl">SAVE & OPEN ERP</button>
            </div>

            <div id="yard-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="y-slot" placeholder="Slot (e.g., S1)" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    <input type="text" id="y-vessel" placeholder="Vessel Name" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="y-sr" placeholder="SR Number" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    <input type="text" id="y-wo" placeholder="WO Number" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <input type="text" id="y-owner" placeholder="Owner/Department" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <label class="block">
                        <span class="text-xs text-slate-400 block mb-1 ml-1">DOCKING DATE</span>
                        <input type="date" id="y-docked" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    </label>
                    <label class="block">
                        <span class="text-xs text-slate-400 block mb-1 ml-1">EST. UNDOCK</span>
                        <input type="date" id="y-est-undock" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    </label>
                </div>
                <button onclick="saveYardEntry()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4">DOCK VESSEL</button>
            </div>

            <div id="task-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="t-sr" placeholder="SR Number" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    <input type="date" id="t-sr-date" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="t-wo" placeholder="WO Number" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                    <input type="date" id="t-wo-date" class="p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                </div>
                <input type="text" id="t-asset" placeholder="Asset Name / Service Description" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                
                <div class="pt-4 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-sm">TASKS / WORK ITEMS</h3>
                        <button onclick="addTaskRow()" class="text-indigo-600 text-xs font-bold">+ ADD ITEM</button>
                    </div>
                    <div id="t-task-list" class="max-h-48 overflow-y-auto pr-2"></div>
                </div>

                <button onclick="saveTaskEntry()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4">CREATE REQUEST</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw", 
            authDomain: "srd-portal-1234.firebaseapp.com", 
            projectId: "srd-portal-1234", 
            databaseURL: "https://srd-portal-1234-default-rtdb.firebaseio.com",
            storageBucket: "srd-portal-1234.firebasestorage.app", 
            messagingSenderId: "286585731956", 
            appId: "1:286585731956:web:47641bcf34033b014f4a21" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let logs = [], yardLogs = [], transactionLogs = [], taskLogs = [], currentPage = 'DASH';
        let showCompleted = false, showUndocked = false, expandedSR = null;

        const STATUS_OPTIONS = ["PENDING", "ITEM CREATION", "PR/MTR-RAISED", "PO-RAISED", "PAYMENT PENDING", "PART RECEIVED", "ALL RECEIVED", "OH-HOLD", "CANCELLED"];
        const YARD_STATUS = ["Docked", "Undocked"];

        // --- AUTH ---
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value).catch(() => alert("Access Denied"));
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if(user) { initData(); setupPresence(user); }
        });

        function setupPresence(user) {
            const myStatusRef = ref(db, `/status/${user.uid}`);
            onValue(ref(db, '.info/connected'), (snap) => { if (snap.val()) { onDisconnect(myStatusRef).set({ state: 'offline', email: user.email }).then(() => set(myStatusRef, { state: 'online', email: user.email })); }});
            onValue(ref(db, '/status'), (snap) => {
                const data = snap.val(); let html = '';
                for (let id in data) if (data[id].state === 'online') html += `<div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase"><span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>${data[id].email.split('@')[0]}</div>`;
                document.getElementById('online-list').innerHTML = html;
            });
        }

        function initData() {
            onValue(ref(db, 'prf_logs'), snap => {
                const val = snap.val();
                logs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                if(currentPage === 'DASH') refreshTable();
            });
            onValue(ref(db, 'yard_logs'), snap => {
                const val = snap.val();
                yardLogs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                if(currentPage === 'YARD') refreshTable();
            });
            onValue(ref(db, 'transactions'), snap => {
                const val = snap.val();
                transactionLogs = val ? Object.values(val).reverse() : [];
                if(currentPage === 'TRANS') refreshTable();
            });
            onValue(ref(db, 'task_logs'), snap => {
                const val = snap.val();
                taskLogs = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
                if(currentPage === 'TASKS') refreshTable();
            });
        }

        // --- NAVIGATION ---
        window.switchPage = (page) => {
            currentPage = page;
            showCompleted = false; showUndocked = false; expandedSR = null;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const navId = 'nav-' + page.toLowerCase();
            if(document.getElementById(navId)) document.getElementById(navId).classList.add('active');
            
            document.getElementById('page-title').innerText = { 'YARD': 'BOAT YARD LOG', 'DASH': 'PRF TRACKER', 'TRANS': 'TRANSACTIONS', 'TASKS': 'TASK MANAGER' }[page];
            document.getElementById('btn-create').style.display = (page === 'TRANS') ? 'none' : 'block';
            document.getElementById('btn-toggle-comp').style.display = (page === 'DASH') ? 'flex' : 'none';
            document.getElementById('btn-toggle-undocked').style.display = (page === 'YARD') ? 'flex' : 'none';
            refreshTable();
        };

        window.toggleCompleted = () => { showCompleted = !showCompleted; document.getElementById('btn-toggle-comp').classList.toggle('active', showCompleted); refreshTable(); };
        window.toggleUndocked = () => { showUndocked = !showUndocked; document.getElementById('btn-toggle-undocked').classList.toggle('active', showUndocked); refreshTable(); };

        // --- CORE TABLE RENDERER ---
        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');

            if (currentPage === 'YARD') {
                head.innerHTML = `<tr><th style="width:70px;">Slot</th><th>Asset Name</th><th style="width:110px;">SR #</th><th style="width:110px;">WO #</th><th>Owner</th><th style="width:110px;">Docked</th><th style="width:150px;">Status</th><th style="width:60px;">Age</th><th style="width:40px;"></th></tr>`;
                const filtered = yardLogs.filter(l => {
                    const matches = l.name?.toUpperCase().includes(q) || l.owner?.toUpperCase().includes(q) || l.slot?.toUpperCase().includes(q) || l.sr?.toUpperCase().includes(q) || l.wo?.toUpperCase().includes(q);
                    return showUndocked ? (matches && l.status === 'Undocked') : (matches && l.status !== 'Undocked');
                });
                body.innerHTML = filtered.map(l => {
                    const start = new Date(l.docked), end = l.undocked ? new Date(l.undocked) : new Date();
                    const age = Math.floor((end - start) / (1000 * 60 * 60 * 24)) || 0;
                    return `<tr>
                        <td style="font-weight:800; color:var(--brand);"><input class="remarks-editor" value="${l.slot}" onblur="updateYard('${l.id}', 'slot', this.value.toUpperCase())"></td>
                        <td><input class="remarks-editor" value="${l.name}" style="font-weight:700;" onblur="updateYard('${l.id}', 'name', this.value.toUpperCase())"></td>
                        <td><input class="remarks-editor" value="${l.sr || ''}" placeholder="SR#" onblur="updateYard('${l.id}', 'sr', this.value.toUpperCase())"></td>
                        <td><input class="remarks-editor" value="${l.wo || ''}" placeholder="WO#" onblur="updateYard('${l.id}', 'wo', this.value.toUpperCase())"></td>
                        <td><input class="remarks-editor" value="${l.owner}" onblur="updateYard('${l.id}', 'owner', this.value.toUpperCase())"></td>
                        <td><input type="date" value="${l.docked}" class="remarks-editor" onchange="updateYard('${l.id}', 'docked', this.value)"></td>
                        <td>
                            <select class="status-select ${l.status === 'Docked' ? 's-Docked' : 's-Undocked'}" onchange="updateYard('${l.id}', 'status', this.value)">
                                ${YARD_STATUS.map(o => `<option ${l.status==o?'selected':''}>${o}</option>`).join('')}
                            </select>
                        </td>
                        <td><span class="age-badge">${age}D</span></td>
                        <td><button onclick="deleteYard('${l.id}')" style="color:var(--danger); font-size:18px;">&times;</button></td>
                    </tr>`;
                }).join('');
                
            } else if (currentPage === 'TASKS') {
                head.innerHTML = `<tr><th style="width:140px;">SR #</th><th style="width:120px;">SR Date</th><th>Asset/Service</th><th style="width:100px;">WOs</th><th style="width:100px;">Total Tasks</th><th style="width:90px;">Avg. %</th><th style="width:40px;"></th></tr>`;
                const grouped = taskLogs.reduce((acc, task) => {
                    if (!acc[task.sr]) acc[task.sr] = { sr: task.sr, srDate: task.srDate, asset: task.asset, wos: {}, totalItems: [] };
                    if (!acc[task.sr].wos[task.wo]) acc[task.sr].wos[task.wo] = { wo: task.wo, woDate: task.woDate, items: [] };
                    acc[task.sr].wos[task.wo].items.push(task);
                    acc[task.sr].totalItems.push(task);
                    return acc;
                }, {});
                const filteredKeys = Object.keys(grouped).filter(k => k.toUpperCase().includes(q) || grouped[k].asset?.toUpperCase().includes(q));
                body.innerHTML = filteredKeys.map(key => {
                    const group = grouped[key];
                    const avgProgress = Math.round(group.totalItems.reduce((sum, t) => sum + parseInt(t.progress || 0), 0) / group.totalItems.length) || 0;
                    let rows = `<tr class="cursor-pointer bg-slate-50" onclick="toggleSRRows('${key}')">
                        <td style="font-weight:800; color:var(--brand);">${group.sr}</td>
                        <td style="color:var(--text-muted); font-size:11px;">${group.srDate || '-'}</td>
                        <td style="font-weight:700;">${group.asset}</td>
                        <td><span class="age-badge">${Object.keys(group.wos).length} WOs</span></td>
                        <td><span class="age-badge">${group.totalItems.length} Tasks</span></td>
                        <td><b style="color:var(--brand)">${avgProgress}%</b></td>
                        <td><button onclick="event.stopPropagation(); deleteSR('${key}')" style="color:var(--danger); font-size:18px;">&times;</button></td>
                    </tr>`;
                    if (expandedSR === key) {
                        Object.keys(group.wos).forEach(woKey => {
                            const wo = group.wos[woKey];
                            rows += `<tr class="bg-slate-100"><td colspan="6" class="pl-10 text-[10px] font-black text-slate-500 uppercase">WO: ${wo.wo} (${wo.woDate})</td><td><button onclick="deleteWO('${key}', '${woKey}')" class="text-amber-500">&times;</button></td></tr>`;
                            wo.items.forEach(t => {
                                rows += `<tr><td colspan="2" class="pl-12 text-[10px]">${t.date}</td><td colspan="2"><input class="remarks-editor" value="${t.details}" onblur="updateTask('${t.id}', 'details', this.value.toUpperCase())"></td><td><input type="number" class="remarks-editor w-12" value="${t.progress}" onblur="updateTask('${t.id}', 'progress', this.value)">%</td><td colspan="2"></td></tr>`;
                            });
                        });
                    }
                    return rows;
                }).join('');

            } else if (currentPage === 'TRANS') {
                head.innerHTML = `<tr><th>Timestamp</th><th>Reference</th><th>Action</th><th>Details</th><th>User</th></tr>`;
                body.innerHTML = transactionLogs.filter(a => a.prf?.toUpperCase().includes(q) || a.action?.toUpperCase().includes(q)).map(a => `<tr><td>${a.time}</td><td style="font-weight:800; color:var(--brand);">${a.prf}</td><td style="font-weight:700;">${a.action}</td><td class="italic text-slate-400">${a.details}</td><td>${a.user}</td></tr>`).join('');
            } else {
                head.innerHTML = `<tr><th style="width:100px;">Date</th><th style="width:120px;">PRF #</th><th>Asset</th><th style="width:100px;">Workshop</th><th style="width:160px;">Status</th><th style="width:140px;">Due Date</th><th>Remarks</th><th style="width:40px;"></th></tr>`;
                body.innerHTML = logs.filter(l => {
                    const matches = l.prf?.toUpperCase().includes(q) || l.asset?.toUpperCase().includes(q);
                    return showCompleted ? (matches && l.status === 'ALL RECEIVED') : (matches && l.status !== 'ALL RECEIVED');
                }).map(l => `<tr class="${l.status === 'ALL RECEIVED' ? 'opacity-50' : ''}"><td>${l.date}</td><td style="font-weight:800; color:var(--brand);">${l.prf}</td><td style="font-weight:700;">${l.asset}</td><td class="text-[10px] font-bold text-slate-400">${l.workshop}</td><td><select class="status-select s-${l.status.replace(/ /g,'-')}" onchange="updateField('${l.id}', 'status', this.value, '${l.prf}')">${STATUS_OPTIONS.map(o => `<option ${l.status==o?'selected':''}>${o}</option>`).join('')}</select></td><td><input type="date" value="${l.eta || ''}" class="remarks-editor" onchange="updateField('${l.id}', 'eta', this.value, '${l.prf}')"></td><td><div class="remarks-editor" contenteditable="true" onblur="updateField('${l.id}', 'remarks', this.innerText.toUpperCase(), '${l.prf}')">${l.remarks || ''}</div></td><td><button onclick="deleteRow('${l.id}')" class="text-slate-300">&times;</button></td></tr>`).join('');
            }
        };

        // --- DATA OPERATIONS ---
        window.savePRF = (erp) => {
            const p = document.getElementById('m-prf').value.toUpperCase(), a = document.getElementById('m-asset').value.toUpperCase(), w = document.getElementById('m-workshop').value;
            if(!p || !a || !w) return alert("Required Fields Missing");
            push(ref(db, 'prf_logs'), { date: new Date().toLocaleDateString('en-GB'), prf: p, asset: a, workshop: w, status: 'PENDING', eta: '', remarks: '' });
            closeModal();
            if(erp) window.open("https://forms.office.com/pages/responsepage.aspx?id=rS-35FLkcEy4rMmBiUUcM-wq0ZU8I9BHssORFyfEW95UN0ZMM1gxR1YwUDZKMkNHMkhFMUdMRzlRSS4u", "_blank");
        };

        window.saveYardEntry = () => {
            const s = document.getElementById('y-slot').value.toUpperCase(), v = document.getElementById('y-vessel').value.toUpperCase(), d = document.getElementById('y-docked').value;
            if(!s || !v || !d) return alert("Slot, Vessel, and Docking Date required.");
            push(ref(db, 'yard_logs'), { slot: s, name: v, sr: document.getElementById('y-sr').value.toUpperCase(), wo: document.getElementById('y-wo').value.toUpperCase(), owner: document.getElementById('y-owner').value.toUpperCase(), docked: d, estUndock: document.getElementById('y-est-undock').value, status: 'Docked', undocked: '' });
            closeModal();
        };

        window.addTaskRow = () => {
            const row = document.createElement('div');
            row.className = 'grid grid-cols-[100px_1fr_60px_30px] gap-2 mb-2 task-input-row';
            row.innerHTML = `<input type="date" class="p-2 text-[10px] bg-slate-50 border border-slate-200 rounded-lg t-row-date"><textarea class="p-2 text-[10px] bg-slate-50 border border-slate-200 rounded-lg t-row-details" placeholder="Task..."></textarea><input type="number" class="p-2 text-[10px] bg-slate-50 border border-slate-200 rounded-lg t-row-prog" value="0"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold">&times;</button>`;
            document.getElementById('t-task-list').appendChild(row);
        };

        window.saveTaskEntry = () => {
            const sr = document.getElementById('t-sr').value.toUpperCase(), wo = document.getElementById('t-wo').value.toUpperCase(), asset = document.getElementById('t-asset').value.toUpperCase();
            const rows = document.querySelectorAll('.task-input-row');
            if(!sr || !wo || !asset || rows.length === 0) return alert("Missing Header or Tasks");
            rows.forEach(r => {
                const details = r.querySelector('.t-row-details').value.toUpperCase();
                if(details) push(ref(db, 'task_logs'), { sr, srDate: document.getElementById('t-sr-date').value, wo, woDate: document.getElementById('t-wo-date').value, asset, date: r.querySelector('.t-row-date').value, details, progress: r.querySelector('.t-row-prog').value, status: 'PLANNED', comments: '' });
            });
            closeModal();
        };

        window.updateYard = (id, f, v) => {
            const upd = { [f]: v };
            if(f === 'undocked' && v !== "") upd.status = "Undocked";
            update(ref(db, `yard_logs/${id}`), upd);
        };

        window.updateField = (id, f, v, prf) => {
            update(ref(db, `prf_logs/${id}`), { [f]: v });
            push(ref(db, 'transactions'), { time: new Date().toLocaleString(), user: auth.currentUser.email.split('@')[0].toUpperCase(), action: `Edit: ${f}`, prf: prf, details: v });
        };

        window.updateTask = (id, f, v) => update(ref(db, `task_logs/${id}`), { [f]: v });
        window.toggleSRRows = (sr) => { expandedSR = expandedSR === sr ? null : sr; refreshTable(); };

        // --- UTILS ---
        window.openModal = () => {
            document.getElementById('entry-modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = { 'DASH': 'NEW PRF', 'YARD': 'DOCK VESSEL', 'TASKS': 'NEW SERVICE REQUEST' }[currentPage];
            document.getElementById('prf-form').style.display = currentPage === 'DASH' ? 'block' : 'none';
            document.getElementById('yard-form').style.display = currentPage === 'YARD' ? 'block' : 'none';
            document.getElementById('task-form').style.display = currentPage === 'TASKS' ? 'block' : 'none';
            if(currentPage === 'TASKS') { document.getElementById('t-task-list').innerHTML = ''; addTaskRow(); }
        };

        window.closeModal = () => document.getElementById('entry-modal').style.display = 'none';
        window.deleteRow = (id) => confirm('Delete PRF?') && remove(ref(db, `prf_logs/${id}`));
        window.deleteYard = (id) => confirm('Undock/Delete Vessel?') && remove(ref(db, `yard_logs/${id}`));
        window.deleteSR = (sr) => confirm('Wipe Entire SR?') && taskLogs.filter(t => t.sr === sr).forEach(t => remove(ref(db, `task_logs/${t.id}`)));

        window.toggleTheme = () => {
            const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('theme-icon').innerText = t === 'light' ? '🌙' : '☀️';
        };

        window.exportPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const head = [['REF', 'ASSET', 'DETAILS', 'STATUS']];
            const data = currentPage === 'YARD' ? yardLogs.map(l => [l.slot, l.name, l.owner, l.status]) : logs.map(l => [l.prf, l.asset, l.remarks, l.status]);
            doc.text(`SRD REPORT - ${currentPage}`, 14, 15);
            doc.autoTable({ head, body: data, startY: 20, theme: 'grid', headStyles: { fillColor: [99, 102, 241] } });
            doc.save(`SRD_${currentPage}_${new Date().toISOString().split('T')[0]}.pdf`);
        };

        // Initial Navigation
        switchPage('DASH');
    </script>
</body>
</html>
