<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRD PORTAL | 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; 
            --side: #0f172a; 
            --brand: #6366f1; 
            --brand-light: #e0e7ff; 
            --success: #10b981; 
            --border: #cbd5e1; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --danger: #f43f5e; 
            --warning: #f59e0b;
        }
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        .sidebar { 
            width: 250px; 
            background: var(--side); 
            color: white; 
            display: flex; 
            flex-direction: column; 
        }
        .nav-btn { 
            padding: 15px 20px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-weight: 600; 
            cursor: pointer; 
            border: none; 
            background: none; 
            text-align: left; 
            transition: 0.2s; 
        }
        .nav-btn:hover, .nav-btn.active { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border-left: 4px solid var(--brand); 
        }
        .main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            overflow-y: auto; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .search-bar { 
            padding: 10px 15px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            width: 300px; 
            outline: none; 
        }
        .btn-main { 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
        }
        .btn-primary { 
            background: var(--brand); 
            color: white; 
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--brand);
            color: var(--brand);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        }
        th, td { 
            padding: 12px 15px; 
            text-align: left; 
            border-bottom: 1px solid var(--border); 
            font-size: 13px; 
        }
        th { 
            background: #f1f5f9; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 11px; 
            color: var(--text-muted); 
        }
        .remarks-editor { 
            width: 100%; 
            border: 1px solid transparent; 
            background: transparent; 
            font-family: inherit; 
            font-size: inherit; 
            padding: 4px; 
            outline: none; 
        }
        .remarks-editor:focus { 
            border-bottom: 1px solid var(--brand); 
        }
        .status-select { 
            padding: 4px 8px; 
            border-radius: 6px; 
            border: none; 
            font-weight: 700; 
            font-size: 12px; 
            cursor: pointer; 
        }
        .s-Docked { background: var(--warning); color: white; }
        .s-Undocked { background: var(--success); color: white; }
        .age-badge { background: var(--brand-light); color: var(--brand); padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 11px; }
        
        /* Modal Styles */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        .modal-content { 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            width: 90%; 
            max-width: 500px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 20px; font-weight: 800; font-size: 18px; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            SRD HUB
        </div>
        <button class="nav-btn active" onclick="switchPage('DASH')">PRF Tracker</button>
        <button class="nav-btn" onclick="switchPage('YARD')">Boat Yard Log</button>
        <button class="nav-btn" onclick="switchPage('TASKS')">Task Manager</button>
        <button class="nav-btn" onclick="switchPage('TRANS')">Transactions</button>
    </div>

    <div class="main">
        <div class="header">
            <h2 id="page-title" style="margin: 0; font-weight: 800;">PRF Tracker</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search-input" class="search-bar" placeholder="Search records..." oninput="refreshTable()">
                <button class="btn-main btn-primary" onclick="openModal()">+ New Entry</button>
            </div>
        </div>

        <div style="flex: 1; overflow-y: auto;">
            <table>
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modal-title" style="margin: 0; font-weight: 800;">New Entry</h3>
                <button onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            </div>

            <div id="dash-form" style="display:none;">
                <input type="text" id="d-prf" placeholder="PRF NUMBER" class="remarks-editor" style="margin-bottom:12px; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                <input type="text" id="d-asset" placeholder="ASSET NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                <input type="text" id="d-workshop" placeholder="WORKSHOP" class="remarks-editor" style="margin-bottom:12px; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                <button onclick="saveDashEntry()" class="btn-main btn-primary" style="width:100%; justify-content:center;">Save PRF Entry</button>
            </div>

            <div id="yard-form" style="display:none;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px;">
                    <input type="text" id="y-sr" placeholder="SR NUMBER" class="remarks-editor" style="padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                    <input type="text" id="y-wo" placeholder="WO NUMBER" class="remarks-editor" style="padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                </div>
                <input type="text" id="y-slot" placeholder="SLOT NUMBER" class="remarks-editor" style="margin-bottom:12px; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                <input type="text" id="y-vessel" placeholder="ASSET NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                <input type="text" id="y-owner" placeholder="OWNER NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                    <div><label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">DOCKING DATE</label><input type="date" id="y-docked" class="remarks-editor" style="padding:10px; border: 1px solid var(--border); border-radius: 8px;"></div>
                    <div><label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">EST. UNDOCK DATE</label><input type="date" id="y-est-undock" class="remarks-editor" style="padding:10px; border: 1px solid var(--border); border-radius: 8px;"></div>
                </div>
                <button onclick="saveYardEntry()" class="btn-main btn-primary" style="width:100%; justify-content:center;">Register Vessel</button>
            </div>

            <div id="task-form" style="display:none;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px;">
                    <div>
                        <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">SR NUMBER</label>
                        <input type="text" id="t-sr" placeholder="SR #" class="remarks-editor" style="padding:10px; border: 1px solid var(--border); border-radius: 8px;">
                    </div>
                    <div>
                        <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">SR DATE</label>
                        <input type="date" id="t-sr-date" class="remarks-editor" style="padding:10px; border: 1px solid var(--border); border-radius: 8px;">
                    </div>
                </div>
                <div style="margin-bottom:12px;">
                    <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">WORK ORDER (WO)</label>
                    <input type="text" id="t-wo" placeholder="Enter WO Number" class="remarks-editor" style="padding:10px; border: 1px solid var(--border); border-radius: 8px;">
                </div>
                <input type="text" id="t-asset" placeholder="ASSET / SERVICE NAME" class="remarks-editor" style="margin-bottom:20px; font-weight:700; padding:14px; border: 1px solid var(--border); border-radius: 8px;">
                
                <div style="margin-bottom: 20px; padding:15px; border-radius: 12px; background: rgba(0,0,0,0.02); border: 1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <label style="font-size: 11px; font-weight: 800; color: var(--text-main);">TASK LIST</label>
                        <button onclick="addTaskRow()" class="btn-main btn-outline" style="padding: 6px 12px; font-size: 12px;">+ Add Row</button>
                    </div>
                    <div id="t-task-list" style="max-height: 220px; overflow-y: auto;"></div>
                </div>
                <button onclick="saveTaskEntry()" class="btn-main btn-primary" style="width:100%; justify-content:center;">Save Request & Tasks</button>
            </div>

        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
