<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRD PORTAL | 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; --side: #0f172a; --brand: #6366f1; --brand-light: #e0e7ff; 
            --success: #10b981; --border: #cbd5e1; --text-main: #1e293b; --text-muted: #64748b; 
            --danger: #f43f5e; --warning: #f59e0b; --card-bg: #ffffff; --input-bg: #ffffff; --table-head: #f1f5f9;
        }
        [data-theme="dark"] {
            --bg: #020617; --side: #000000; --brand: #818cf8; --brand-light: rgba(99, 102, 241, 0.15);
            --border: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8; --card-bg: #0f172a;
            --input-bg: #1e293b; --table-head: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; transition: background 0.3s; }

        .sidebar { width: 260px; background: var(--side); color: white; display: flex; flex-direction: column; padding: 40px 20px; flex-shrink: 0; z-index: 100; border-right: 2px solid rgba(255,255,255,0.1); transition: margin-left 0.3s ease; }
        .sidebar.hidden { margin-left: -260px; }
        .logo-box { margin-bottom: 50px; padding-left: 15px; border-left: 4px solid var(--brand); }
        .logo-box h1 { font-size: 14px; font-weight: 800; line-height: 1.2; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        
        .nav-btn { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid transparent; background: transparent; color: #94a3b8; font-weight: 600; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 8px; text-transform: uppercase; }
        .nav-btn.active { background: var(--brand); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); border-color: rgba(255,255,255,0.2); }

        .wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .top-bar { padding: 20px 40px; background: var(--card-bg); border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 20px; }
        
        .search-wrap { flex: 1; max-width: 400px; }
        .search-wrap input { width: 100%; padding: 12px 20px; border-radius: 14px; border: 2px solid var(--border); background: var(--input-bg); color: var(--text-main); font-size: 13px; font-family: inherit; }

        .table-container { background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 2px solid var(--border); overflow: hidden; margin: 30px 40px; flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: var(--table-head); padding: 18px 20px; text-align: left; font-size: 10px; font-weight: 800; color: var(--text-main); text-transform: uppercase; border-bottom: 2px solid var(--border); z-index: 10; }
        tbody td { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .remarks-editor { width: 100%; padding: 8px; background: var(--bg); border-radius: 8px; font-size: 12px; border: 1px solid var(--border); font-family: inherit; color: var(--text-main); }
        .status-select { padding: 8px; border-radius: 10px; font-size: 10px; font-weight: 800; width: 120px; border: none; cursor: pointer; }
        .s-Docked { background: #dcfce7; color: #166534; }
        .s-Undocked { background: #f1f5f9; color: #475569; }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 500px; border: 2px solid var(--brand); }
        .btn-main { padding: 12px 20px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--brand); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-main); }
        .age-badge { font-weight: 800; font-size: 11px; color: var(--brand); background: var(--brand-light); padding: 4px 10px; border-radius: 6px; }
    </style>
</head>
<body data-theme="light">

    <div id="auth-overlay" style="position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 5000;">
        <div style="background: white; padding: 50px; border-radius: 30px; width: 400px; text-align: center;">
            <h2 style="margin-bottom: 25px; font-weight: 800;">SYSTEM ACCESS</h2>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:2px solid #cbd5e1;">
            <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:2px solid #cbd5e1;">
            <button onclick="handleLogin()" class="btn-main btn-primary" style="width:100%; justify-content: center;">Authenticate</button>
        </div>
    </div>

    <nav class="sidebar">
        <div class="logo-box"><h1>SRD<br>PORTAL 2026</h1></div>
        <div style="flex: 1;">
            <button id="nav-dash" onclick="switchPage('DASH')" class="nav-btn active">PRF TRACKER</button>
            <button id="nav-yard" onclick="switchPage('YARD')" class="nav-btn">Boat Yard Log</button>
            <button id="nav-tasks" onclick="switchPage('TASKS')" class="nav-btn">Task Manager</button>
        </div>
        <button onclick="handleLogout()" class="nav-btn" style="color: var(--danger);">Sign Out</button>
    </nav>

    <div class="wrapper">
        <header class="top-bar">
            <div class="header-info"><h2 id="page-title">PRF TRACKER</h2></div>
            <div class="search-wrap"><input type="text" id="main-search" placeholder="Search records..." onkeyup="refreshTable()"></div>
            <div style="display:flex; gap:10px; margin-left:auto;">
                <button onclick="toggleTheme()" class="btn-main btn-outline">🌙</button>
                <button onclick="exportPDF()" class="btn-main btn-outline">Export PDF</button>
                <button onclick="openModal()" class="btn-main btn-primary">+ Create Entry</button>
            </div>
        </header>

        <main class="table-container">
            <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
        </main>
    </div>

    <div id="entry-modal" class="overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom:25px; font-weight: 800;">NEW ENTRY</h2>
            <div id="yard-form" style="display:none;">
                <input type="text" id="y-slot" placeholder="SLOT NUMBER" class="remarks-editor" style="margin-bottom:12px; padding:14px;">
                <input type="text" id="y-vessel" placeholder="ASSET NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px;">
                <input type="text" id="y-owner" placeholder="OWNER NAME" class="remarks-editor" style="margin-bottom:12px; padding:14px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px;">
                    <input type="text" id="y-sr" placeholder="SR NUMBER" class="remarks-editor" style="padding:14px;">
                    <input type="text" id="y-wo" placeholder="WO NUMBER" class="remarks-editor" style="padding:14px;">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px;">
                    <input type="date" id="y-docked" class="remarks-editor">
                    <input type="date" id="y-est-undock" class="remarks-editor">
                </div>
                <button onclick="saveYardEntry()" class="btn-main btn-primary" style="width:100%; justify-content:center;">Register Vessel</button>
            </div>
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // Firebase Config (Replace with your own)
        const firebaseConfig = { databaseURL: "https://srd-portal-1234-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let yardLogs = [], currentPage = 'DASH';

        // --- Auth ---
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
        window.handleLogout = () => signOut(auth);
        onAuthStateChanged(auth, user => { document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex'; });

        // --- Data ---
        onValue(ref(db, 'yard_logs'), snap => {
            yardLogs = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})) : [];
            refreshTable();
        });

        window.switchPage = (p) => {
            currentPage = p;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + p.toLowerCase()).classList.add('active');
            document.getElementById('page-title').innerText = p === 'YARD' ? 'BOAT YARD LOG' : 'PRF TRACKER';
            refreshTable();
        };

        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');

            if (currentPage === 'YARD') {
                head.innerHTML = `<tr>
                    <th style="width:80px;">Slot</th>
                    <th>Asset Name</th>
                    <th>Owner</th>
                    <th style="width:100px;">SR #</th>
                    <th style="width:100px;">WO #</th>
                    <th style="width:110px;">Docked</th>
                    <th style="width:120px;">Status</th>
                    <th style="width:80px;">Age</th>
                    <th style="width:40px;"></th>
                </tr>`;
                
                const filtered = yardLogs.filter(l => (l.name?.toUpperCase().includes(q) || l.sr?.toUpperCase().includes(q)));
                body.innerHTML = filtered.map(l => {
                    const age = Math.floor((new Date() - new Date(l.docked)) / 86400000) || 0;
                    return `<tr>
                        <td><input class="remarks-editor" value="${l.slot || ''}" onblur="updateYard('${l.id}', 'slot', this.value)"></td>
                        <td><input class="remarks-editor" style="font-weight:700" value="${l.name || ''}" onblur="updateYard('${l.id}', 'name', this.value)"></td>
                        <td><input class="remarks-editor" value="${l.owner || ''}" onblur="updateYard('${l.id}', 'owner', this.value)"></td>
                        <td><input class="remarks-editor" value="${l.sr || ''}" onblur="updateYard('${l.id}', 'sr', this.value)" placeholder="SR-"></td>
                        <td><input class="remarks-editor" value="${l.wo || ''}" onblur="updateYard('${l.id}', 'wo', this.value)" placeholder="WO-"></td>
                        <td><input type="date" class="remarks-editor" value="${l.docked}" onchange="updateYard('${l.id}', 'docked', this.value)"></td>
                        <td>
                            <select class="status-select s-${l.status}" onchange="updateYard('${l.id}', 'status', this.value)">
                                <option value="Docked" ${l.status==='Docked'?'selected':''}>Docked</option>
                                <option value="Undocked" ${l.status==='Undocked'?'selected':''}>Undocked</option>
                            </select>
                        </td>
                        <td><span class="age-badge">${age}D</span></td>
                        <td><button onclick="deleteYard('${l.id}')" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></td>
                    </tr>`;
                }).join('');
            }
        };

        window.updateYard = (id, f, v) => update(ref(db, `yard_logs/${id}`), { [f]: v });
        
        window.saveYardEntry = () => {
            const data = {
                slot: document.getElementById('y-slot').value,
                name: document.getElementById('y-vessel').value,
                owner: document.getElementById('y-owner').value,
                sr: document.getElementById('y-sr').value,
                wo: document.getElementById('y-wo').value,
                docked: document.getElementById('y-docked').value,
                estUndock: document.getElementById('y-est-undock').value,
                status: 'Docked'
            };
            push(ref(db, 'yard_logs'), data);
            closeModal();
        };

        window.openModal = () => {
            document.getElementById('yard-form').style.display = currentPage === 'YARD' ? 'block' : 'none';
            document.getElementById('entry-modal').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('entry-modal').style.display = 'none';
    </script>
</body>
</html>
